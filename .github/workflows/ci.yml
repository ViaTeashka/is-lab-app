name: CI/CD

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: dotnet build IsLabApp.csproj

      - name: Simulation Test
        run: echo "Testing completed successfully!"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/viateashka/is-lab-app:latest
            ghcr.io/viateashka/is-lab-app:${{ github.sha }}

