name: CD Workflow

on:
  workflow_run:
    workflows: ["Lab10: add versioning tags"]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted  # Это заставит задание прийти на твою виртуалку
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Update and Restart Application
        run: |
          echo ${{ secrets.GHCR_TOKEN }} | sudo docker login ghcr.io -u ${{ secrets.GHCR_USER }} --password-stdin
          cd /home/deployer/deploy/is-stack
          sudo docker compose pull
          sudo docker compose up -d
          sudo docker image prune -f
